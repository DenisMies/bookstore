<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"></html>
    <head>
        <title>Booklist</title>
        <meta http-equiv="Content-Type" contect="text/html" charset="UTF-8">
        <link type="text/css" rel="stylesheet" href="/css/bootstrap.min.css" 
        th:href="@{/css/bootstrap.min.css}" />
    </head>
    <body>
        <h1>Books</h1>
        <h2>Hello <span sec:authentication="name"></span>!</h2>
        <form th:action="@{/logout}" method="post">
	        <input type="submit" value="Sign Out"/>
        </form>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Author</th>
                    <th>Title</th>
                    <th>ISBN</th>
                    <th>Year</th>
                    <th>Category</th>
                    <th sec:authorize="hasAuthority ('ADMIN')"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each = "book : ${books}">
                    <td th:text="${book.author}"></td>
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.isbn}"></td>
                    <td th:text="${book.publicationYear}"></td>
                    <td th:text="${book.category.name}"></td>
                    <td sec:authorize="hasAuthority ('ADMIN')"><a th:href="@{/delete/{id}(id=${book.id})}" class="btn btn-danger">Delete</a></td>
                    <td><a th:href="@{/edit/{id}(id=${book.id})}" class="btn btn-success">Edit</a></td>
                </tr>
            </tbody>
        </table>
        <a>
            <a href="/add" class="btn btn-primary">Add book</a>
        </a>
    </body>

</html>
